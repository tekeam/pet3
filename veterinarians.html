<!doctype html><html lang="fa" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>مراکز خدمات حیوانات خانگی | نینجا پت</title><meta name="description" content="فهرست کلینیک‌های دامپزشکی، آرایشگاه‌های حیوانات، پانسیون‌ها و پت‌شاپ‌ها بر اساس استان و شهر"><link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="page.css"><style>.service-types{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:25px 0}.service-types button{border:1px solid var(--line);background:#fff;border-radius:16px;padding:17px;cursor:pointer;font-weight:800}.service-types button.active{background:var(--purple);color:#fff}.center-cover{height:180px;border-radius:14px;overflow:hidden;background:#eee;margin-bottom:14px}.center-cover img{width:100%;height:100%;object-fit:cover}.center-gallery{display:flex;gap:7px;margin:12px 0;overflow:auto}.center-gallery button{border:0;padding:0;background:none;cursor:pointer}.center-gallery img{width:62px;height:54px;object-fit:cover;border-radius:8px}.type-badge{display:inline-block;background:#f0e9f8;color:var(--purple);padding:4px 9px;border-radius:20px;font-size:11px;font-weight:800}.gallery-dialog{width:min(900px,calc(100% - 25px));padding:18px}.gallery-dialog img{width:100%;max-height:70vh;object-fit:contain;border-radius:14px}@media(max-width:700px){.service-types{grid-template-columns:1fr 1fr}}</style></head><body><header class="site-header"><a class="brand" href="index.html"><span class="brand-mark">🐱‍👤</span><span>NINJA PET</span></a><nav class="desktop-nav"><a href="index.html">خانه</a><a href="catalog.html?pet=cat">غذاهای گربه</a><a href="catalog.html?pet=dog">غذاهای سگ</a><a href="brands.html">برندها</a><a class="active" href="veterinarians.html">مراکز پت</a></nav><div class="header-actions"><a class="icon-btn" href="search.html">⌕</a></div></header><section class="page-hero"><div class="section-shell"><div class="breadcrumbs"><a href="index.html">خانه</a> / مراکز خدمات حیوانات خانگی</div><span class="eyebrow">بانک جامع خدمات پت</span><h1>مراکز خدمات حیوانات خانگی</h1><p>کلینیک‌های دامپزشکی، آرایشگاه‌های پت، پانسیون‌ها و پت‌شاپ‌ها را بر اساس استان و شهر پیدا کنید.</p><div class="service-types"><button class="active" data-type="all">همه مراکز</button><button data-type="clinic">کلینیک دامپزشکی</button><button data-type="grooming">آرایشگاه پت</button><button data-type="boarding">پانسیون حیوانات</button><button data-type="petshop">پت‌شاپ</button></div></div></section><main class="section-shell catalog-layout"><aside class="filters"><h3>جستجوی مرکز</h3><label>نام مرکز</label><input id="q" placeholder="نام مرکز یا آدرس"><label>استان</label><select id="province"><option value="all">همه استان‌ها</option></select><label>شهر</label><select id="city"><option value="all">همه شهرها</option></select></aside><section><div class="results-head"><h2>مراکز ثبت‌شده</h2><span id="count"></span></div><div class="vet-grid" id="results"></div></section></main><dialog id="galleryDialog" class="gallery-dialog"><button class="dialog-close" onclick="galleryDialog.close()">×</button><img id="galleryImage" alt="تصویر مرکز"></dialog><script src="data.js"></script><script src="directory-data.js"></script><script src="shared.js"></script><script>const typeNames={clinic:'کلینیک دامپزشکی',grooming:'آرایشگاه پت',boarding:'پانسیون حیوانات',petshop:'پت‌شاپ'};let activeType='all';Object.keys(Ninja.D.locations).forEach(x=>province.insertAdjacentHTML('beforeend',`<option>${x}</option>`));function cities(){city.innerHTML='<option value="all">همه شهرها</option>';if(province.value!=='all')(Ninja.D.locations[province.value]||[]).forEach(x=>city.insertAdjacentHTML('beforeend',`<option>${x}</option>`))}function field(v,label){return v?`<div><b>${label}:</b> ${v}</div>`:''}function draw(){const text=q.value.trim().toLowerCase();const list=Ninja.D.centers.filter(v=>(activeType==='all'||v.type===activeType)&&(province.value==='all'||v.province===province.value)&&(city.value==='all'||v.city===city.value)&&(!text||[v.name,v.address,v.city,v.province].join(' ').toLowerCase().includes(text)));results.innerHTML=list.map(v=>{const gallery=(v.gallery||[]).filter(Boolean);const cover=v.cover||gallery[0]||'';return `<article class="vet-card">${cover?`<div class="center-cover"><img src="${cover}" alt="${v.name}" loading="lazy"></div>`:''}<span class="type-badge">${typeNames[v.type]||'مرکز خدمات پت'}</span><h3>${v.name}</h3><p>${v.province}، ${v.city}</p>${field(v.phone,'تلفن')}${v.whatsapp?`<a href="https://wa.me/${v.whatsapp}">واتساپ: ${v.whatsapp}</a>`:''}${v.instagram?`<a href="https://instagram.com/${v.instagram.replace('@','')}">اینستاگرام: ${v.instagram}</a>`:''}${field(v.address,'آدرس')}${field(v.hours,'ساعات کاری')}${v.lat&&v.lng?`<a target="_blank" href="https://www.google.com/maps?q=${v.lat},${v.lng}">مشاهده روی نقشه</a>`:''}${gallery.length?`<div class="center-gallery">${gallery.map(img=>`<button data-img="${img}"><img src="${img}" alt="گالری ${v.name}" loading="lazy"></button>`).join('')}</div>`:''}</article>`}).join('')||'<div class="empty-state">مرکزی با این فیلتر ثبت نشده است.</div>';count.textContent=`${list.length} مرکز`}document.querySelectorAll('[data-type]').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('[data-type]').forEach(x=>x.classList.remove('active'));b.classList.add('active');activeType=b.dataset.type;draw()}));province.addEventListener('change',()=>{cities();draw()});[q,city].forEach(x=>x.addEventListener('input',draw));results.addEventListener('click',e=>{const b=e.target.closest('[data-img]');if(b){galleryImage.src=b.dataset.img;galleryDialog.showModal()}});const p=Ninja.qs('province'),c=Ninja.qs('city');if(p&&Ninja.D.locations[p]){province.value=p;cities();if(c)city.value=c}draw();</script></body></html>
