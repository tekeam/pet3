<!doctype html><html lang="fa" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>دامپزشکی‌های ایران | نینجا پت</title><meta name="description" content="فهرست دامپزشکی‌ها بر اساس استان و شهر با تلفن، واتساپ، اینستاگرام، آدرس، ساعات کاری و لوکیشن"><link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="page.css"></head><body><header class="site-header"><a class="brand" href="index.html"><span class="brand-mark">🐱‍👤</span><span>NINJA PET</span></a><nav class="desktop-nav"><a href="index.html">خانه</a><a href="catalog.html?pet=cat">غذاهای گربه</a><a href="catalog.html?pet=dog">غذاهای سگ</a><a href="brands.html">برندها</a><a class="active" href="veterinarians.html">دامپزشکی‌ها</a></nav><div class="header-actions"><a class="icon-btn" href="search.html">⌕</a></div></header><section class="page-hero"><div class="section-shell"><div class="breadcrumbs"><a href="index.html">خانه</a> / دامپزشکی‌ها</div><span class="eyebrow">بانک مراکز درمانی حیوانات</span><h1>دامپزشکی‌های ایران</h1><p>استان و شهر را انتخاب کنید. فیلدهای خالی هر مرکز به‌صورت خودکار نمایش داده نمی‌شوند.</p></div></section><main class="section-shell catalog-layout"><aside class="filters"><h3>جستجوی مرکز</h3><label>نام دامپزشکی</label><input id="q" placeholder="نام مرکز"><label>استان</label><select id="province"><option value="all">همه استان‌ها</option></select><label>شهر</label><select id="city"><option value="all">همه شهرها</option></select></aside><section><div class="results-head"><h2>مراکز ثبت‌شده</h2><span id="count"></span></div><div class="vet-grid" id="results"></div></section></main><script src="data.js"></script><script src="shared.js"></script><script>Object.keys(Ninja.D.locations).forEach(x=>province.insertAdjacentHTML('beforeend',`<option>${x}</option>`));function cities(){city.innerHTML='<option value="all">همه شهرها</option>';if(province.value!=='all')Ninja.D.locations[province.value].forEach(x=>city.insertAdjacentHTML('beforeend',`<option>${x}</option>`))}function field(v,label,html=''){return v?`<${html||'div'}>${label?`<b>${label}:</b> `:''}${v}</${html||'div'}>`:''}function draw(){const text=q.value.trim().toLowerCase();const list=Ninja.D.vets.filter(v=>(province.value==='all'||v.province===province.value)&&(city.value==='all'||v.city===city.value)&&(!text||[v.name,v.address,v.city,v.province].join(' ').toLowerCase().includes(text)));results.innerHTML=list.map(v=>`<article class="vet-card"><h3>${v.name}</h3><p>${v.province}، ${v.city}</p>${field(v.phone,'تلفن')}${v.whatsapp?`<a href="https://wa.me/${v.whatsapp}">واتساپ: ${v.whatsapp}</a>`:''}${v.instagram?`<a href="https://instagram.com/${v.instagram.replace('@','')}">اینستاگرام: ${v.instagram}</a>`:''}${field(v.address,'آدرس')}${field(v.hours,'ساعات کاری')}${v.lat&&v.lng?`<a target="_blank" href="https://www.google.com/maps?q=${v.lat},${v.lng}">مشاهده روی نقشه</a>`:''}</article>`).join('')||'<div class="empty-state">مرکزی با این فیلتر ثبت نشده است.</div>';count.textContent=`${list.length} مرکز`}province.addEventListener('change',()=>{cities();draw()});[q,city].forEach(x=>x.addEventListener('input',draw));cities();draw();</script></body></html>
