<!doctype html><html lang="fa" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>فهرست غذاها | نینجا پت</title><meta name="description" content="فهرست تخصصی غذای سگ و گربه با فیلتر سن، نژاد، برند و نیاز تغذیه‌ای"><link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="page.css"></head><body><header class="site-header"><a class="brand" href="index.html"><span class="brand-mark">🐱‍👤</span><span>NINJA PET</span></a><nav class="desktop-nav"><a href="index.html">خانه</a><a data-nav="cat" href="catalog.html?pet=cat">غذاهای گربه</a><a data-nav="dog" href="catalog.html?pet=dog">غذاهای سگ</a><a href="brands.html">برندها</a><a href="veterinarians.html">دامپزشکی‌ها</a></nav><div class="header-actions"><a class="icon-btn" href="search.html" aria-label="جستجو">⌕</a><button class="menu-btn">☰</button></div></header><section class="page-hero"><div class="section-shell"><div class="breadcrumbs"><a href="index.html">خانه</a> / <span id="crumb"></span></div><span class="eyebrow">بانک تخصصی محصولات</span><h1 id="title"></h1><p id="lead"></p></div></section><main class="section-shell catalog-layout"><aside class="filters"><h3>فیلتر حرفه‌ای</h3><label>جستجو</label><input id="q" placeholder="نام، نژاد یا نیاز..."><label>برند</label><select id="brand"><option value="all">همه برندها</option></select><label>سن</label><select id="age"><option value="all">همه سنین</option><option value="kitten">توله / بچه</option><option value="adult">بالغ</option><option value="senior">سالمند</option></select><label>نژاد</label><input id="breed" placeholder="مثلاً پرشین"><label>نیاز تغذیه‌ای</label><input id="need" placeholder="مثلاً عقیم‌شده"></aside><section><div class="results-head"><h2>محصولات</h2><span id="count"></span></div><div class="product-grid" id="results"></div></section></main><script src="data.js"></script><script src="shared.js"></script><script>const pet=Ninja.qs('pet')||'cat';Ninja.fillHeader(pet);title.textContent=pet==='cat'?'غذاهای گربه':'غذاهای سگ';crumb.textContent=title.textContent;lead.textContent='انتخاب غذا بر اساس برند، سن، نژاد و نیازهای تغذیه‌ای.';Ninja.D.brands.forEach(b=>brand.insertAdjacentHTML('beforeend',`<option value="${b.slug}">${b.fa}</option>`));function draw(){const text=q.value.trim().toLowerCase(),br=breed.value.trim().toLowerCase(),nd=need.value.trim().toLowerCase();const list=Ninja.D.products.filter(p=>p.pet===pet&&(brand.value==='all'||p.brand===brand.value)&&(age.value==='all'||p.age===age.value)&&(!br||p.breed.toLowerCase().includes(br))&&(!nd||p.need.toLowerCase().includes(nd))&&(!text||[p.fa,p.name,p.desc,p.breed,p.need,Ninja.brandOf(p.brand)?.fa].join(' ').toLowerCase().includes(text)));results.innerHTML=list.map(Ninja.productCard).join('')||'<div class="empty-state">محصولی پیدا نشد.</div>';count.textContent=`${list.length} محصول`}[q,brand,age,breed,need].forEach(x=>x.addEventListener('input',draw));draw();</script></body></html>
