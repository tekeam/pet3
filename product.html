<!doctype html><html lang="fa" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>محصول | نینجا پت</title><link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="page.css"></head><body><header class="site-header"><a class="brand" href="index.html"><span class="brand-mark">🐱‍👤</span><span>NINJA PET</span></a><nav class="desktop-nav"><a href="index.html">خانه</a><a href="catalog.html?pet=cat">غذاهای گربه</a><a href="catalog.html?pet=dog">غذاهای سگ</a><a href="brands.html">برندها</a><a href="veterinarians.html">دامپزشکی‌ها</a></nav><div class="header-actions"><a class="icon-btn" href="search.html">⌕</a></div></header><main class="section-shell detail-shell" id="root"></main><script src="data.js"></script><script src="shared.js"></script><script>const p=Ninja.productOf(Ninja.qs('slug'));if(!p){root.innerHTML='<h1>محصول پیدا نشد</h1><a href="brands.html">بازگشت</a>'}else{const b=Ninja.brandOf(p.brand);document.title=`${p.fa} | نینجا پت`;const related=Ninja.D.products.filter(x=>x.brand===p.brand&&x.slug!==p.slug).slice(0,4);root.innerHTML=`<div class="breadcrumbs"><a href="index.html">خانه</a> / <a href="brand.html?slug=${b.slug}">${b.fa}</a> / ${p.fa}</div><section class="product-detail"><div class="product-showcase"><div class="mini-bag" style="background:${p.color}">${b.name}<br><small>${p.name}</small></div></div><div class="detail-copy"><span class="eyebrow">${b.fa}</span><h1>${p.fa}</h1><p>${p.desc}</p><div class="detail-grid"><div class="detail-box"><b>مناسب برای</b><br>${p.pet==='cat'?'گربه':'سگ'}، ${p.age}</div><div class="detail-box"><b>نژاد یا جثه</b><br>${p.breed}</div><div class="detail-box"><b>کاربرد اصلی</b><br>${p.need}</div><div class="detail-box"><b>پروتئین / چربی تقریبی</b><br>${p.protein} / ${p.fat}</div></div><p><strong>هشدار علمی:</strong> ترکیبات و آنالیز نهایی باید با برچسب رسمی همان محصول و بازار تطبیق داده شود. غذاهای درمانی فقط با نظر دامپزشک مصرف شوند.</p><a class="outline-button" href="brand.html?slug=${b.slug}">مشاهده همه محصولات ${b.fa}</a></div></section><section class="related"><div class="section-heading"><div><span>محصولات مرتبط</span><h2>مدل‌های دیگر ${b.fa}</h2></div></div><div class="product-grid">${related.map(Ninja.productCard).join('')}</div></section>`}</script></body></html>
