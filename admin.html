<!doctype html><html lang="fa" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>پنل مدیریت نینجا پت</title><link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="page.css"><style>body{background:#f4f5f8}.admin-shell{display:grid;grid-template-columns:250px 1fr;min-height:100vh}.admin-side{background:#0d172a;color:#fff;padding:25px 18px}.admin-side a{display:block;padding:11px 14px;margin:5px 0;border-radius:10px;color:#cbd2df}.admin-main{padding:28px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}.stat{background:#fff;border-radius:18px;padding:20px}.stat strong{display:block;font-size:30px;color:#5b2ca0}.admin-form button{background:#5b2ca0;color:#fff;border:0;border-radius:10px;padding:11px 18px}.notice{background:#eef8f2;color:#276749;padding:12px;border-radius:10px;display:none}.login-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#071327,#2b1749);display:grid;place-items:center;z-index:100}.login-card{background:#fff;padding:30px;border-radius:24px;width:min(390px,calc(100% - 30px))}.login-card input,.login-card button{width:100%;margin:7px 0;padding:11px;border-radius:10px}.login-card button{border:0;background:#5b2ca0;color:#fff}.field-help{font-size:11px;color:#777;display:block;margin-top:-8px;margin-bottom:10px}@media(max-width:850px){.admin-shell{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}.admin-main{padding:16px}}</style></head><body><div class="login-overlay" id="loginOverlay"><form class="login-card" id="loginForm"><div class="brand"><span class="brand-mark">🐱‍👤</span><span>NINJA PET</span></div><h2>ورود مدیر</h2><input value="admin" placeholder="نام کاربری"><input type="password" value="NinjaPet1405" placeholder="رمز عبور"><button>ورود</button></form></div><div class="admin-shell"><aside class="admin-side"><a class="brand" href="index.html"><span class="brand-mark">🐱‍👤</span><span>NINJA PET</span></a><a href="#dashboard">داشبورد</a><a href="#brandForm">افزودن برند</a><a href="#productForm">افزودن محصول</a><a href="#centerForm">افزودن مرکز خدمات پت</a><a href="index.html">نمایش سایت</a></aside><main class="admin-main"><h1 id="dashboard">مدیریت محتوا</h1><div class="stats"><article class="stat"><span>برندها</span><strong id="brandCount"></strong></article><article class="stat"><span>محصولات</span><strong id="productCount"></strong></article><article class="stat"><span>مراکز خدمات پت</span><strong id="centerCount"></strong></article><article class="stat"><span>استان‌ها</span><strong id="provinceCount"></strong></article></div><div id="notice" class="notice"></div><section class="admin-forms"><form class="admin-form" id="brandForm"><h2>افزودن برند جدید</h2><input name="fa" required placeholder="نام فارسی برند"><input name="name" required placeholder="نام انگلیسی برند"><input name="slug" placeholder="اسلاگ اختیاری"><textarea name="desc" placeholder="توضیح برند"></textarea><button>ثبت برند و ایجاد لینک</button></form><form class="admin-form" id="productForm"><h2>افزودن محصول جدید</h2><input name="fa" required placeholder="نام فارسی محصول"><input name="name" required placeholder="نام انگلیسی محصول"><select name="brand" id="productBrand" required></select><input name="slug" placeholder="اسلاگ اختیاری"><div class="check-row"><label><input type="radio" name="pet" value="cat" checked> غذای گربه</label><label><input type="radio" name="pet" value="dog"> غذای سگ</label></div><select name="age"><option value="kitten">توله / بچه</option><option value="adult" selected>بالغ</option><option value="senior">سالمند</option></select><input name="breed" placeholder="نژاد یا جثه"><input name="need" placeholder="کاربرد؛ مثلاً عقیم‌شده"><textarea name="desc" required placeholder="توضیحات کامل محصول"></textarea><input name="protein" placeholder="پروتئین"><input name="fat" placeholder="چربی"><button>ثبت محصول و ایجاد صفحه اختصاصی</button></form><form class="admin-form" id="centerForm"><h2>افزودن مرکز خدمات حیوانات</h2><select name="type" required><option value="clinic">کلینیک دامپزشکی</option><option value="grooming">آرایشگاه پت</option><option value="boarding">پانسیون حیوانات</option><option value="petshop">پت‌شاپ</option></select><input name="name" required placeholder="نام مرکز"><select name="province" id="centerProvince" required></select><select name="city" id="centerCity" required></select><input name="phone" placeholder="شماره تماس"><input name="whatsapp" placeholder="واتساپ"><input name="instagram" placeholder="اینستاگرام"><textarea name="address" placeholder="آدرس"></textarea><input name="hours" placeholder="ساعات کاری"><input name="lat" placeholder="عرض جغرافیایی"><input name="lng" placeholder="طول جغرافیایی"><input name="cover" placeholder="آدرس اینترنتی تصویر اصلی"><textarea name="gallery" placeholder="لینک تصاویر گالری؛ هر لینک در یک خط"></textarea><span class="field-help">برای چند تصویر، هر URL را در یک خط جداگانه قرار بده.</span><button>ثبت مرکز خدمات پت</button></form></section></main></div><script src="data.js"></script><script src="directory-data.js"></script><script src="shared.js"></script><script>const D=Ninja.D;brandCount.textContent=D.brands.length;productCount.textContent=D.products.length;centerCount.textContent=D.centers.length;provinceCount.textContent=Object.keys(D.locations).length;D.brands.forEach(b=>productBrand.insertAdjacentHTML('beforeend',`<option value="${b.slug}">${b.fa}</option>`));Object.keys(D.locations).forEach(p=>centerProvince.insertAdjacentHTML('beforeend',`<option>${p}</option>`));function fillCities(){centerCity.innerHTML='';(D.locations[centerProvince.value]||[]).forEach(c=>centerCity.insertAdjacentHTML('beforeend',`<option>${c}</option>`))}centerProvince.addEventListener('change',fillCities);fillCities();function done(t){notice.textContent=t;notice.style.display='block';setTimeout(()=>notice.style.display='none',4000)}brandForm.addEventListener('submit',e=>{e.preventDefault();const f=new FormData(e.target),x={fa:f.get('fa'),name:f.get('name'),slug:f.get('slug')||Ninja.makeSlug(f.get('name')),desc:f.get('desc')};const a=JSON.parse(localStorage.getItem('ninjaBrands')||'[]');a.push(x);localStorage.setItem('ninjaBrands',JSON.stringify(a));done(`برند ثبت شد: brand.html?slug=${x.slug}`);e.target.reset()});productForm.addEventListener('submit',e=>{e.preventDefault();const f=new FormData(e.target),x={fa:f.get('fa'),name:f.get('name'),brand:f.get('brand'),slug:f.get('slug')||Ninja.makeSlug(`${f.get('brand')}-${f.get('name')}`),pet:f.get('pet'),age:f.get('age'),breed:f.get('breed')||'همه نژادها',need:f.get('need')||'مصرف روزانه',desc:f.get('desc'),protein:f.get('protein')||'-',fat:f.get('fat')||'-',color:'linear-gradient(#5b2ca0,#16112a)'};const a=JSON.parse(localStorage.getItem('ninjaProducts')||'[]');a.push(x);localStorage.setItem('ninjaProducts',JSON.stringify(a));done(`محصول ثبت شد: product.html?slug=${x.slug}`);e.target.reset()});centerForm.addEventListener('submit',e=>{e.preventDefault();const f=new FormData(e.target),x=Object.fromEntries(f.entries());x.slug=Ninja.makeSlug(`${x.name}-${x.city}`);x.gallery=String(x.gallery||'').split('\n').map(s=>s.trim()).filter(Boolean);if(!x.cover&&x.gallery.length)x.cover=x.gallery[0];const a=JSON.parse(localStorage.getItem('ninjaCenters')||'[]');a.push(x);localStorage.setItem('ninjaCenters',JSON.stringify(a));done('مرکز خدمات حیوانات همراه با تصاویر ثبت شد.');e.target.reset()});loginForm.addEventListener('submit',e=>{e.preventDefault();loginOverlay.style.display='none';sessionStorage.setItem('ninjaAdminDemo','1')});if(sessionStorage.getItem('ninjaAdminDemo'))loginOverlay.style.display='none';</script></body></html>
